name: CI

on:
  push:
    branches: [main]
    paths: &ci-paths
      - "dart/**"
      - "flutter/**"
      - "Makefile"
      - "scripts/ci/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths: *ci-paths
  workflow_call:

# No top-level `concurrency:` here -- this workflow is also invoked as a
# reusable workflow from release.yml (run-tests), and inside that context
# `github.workflow` still refers to the *caller's* name ("Release"), not
# "CI". A concurrency group keyed on `${{ github.workflow }}-${{ github.ref
# }}` would then resolve to the exact same group release.yml's own
# top-level concurrency block already holds for that run, which GitHub
# detects as a self-deadlock and cancels outright ("Canceling since a
# deadlock was detected for concurrency group ... between a top level
# workflow and 'run-tests'"). release.yml's own concurrency block is enough
# to dedupe/cancel superseded release runs; a stale push/pull_request CI
# run for this workflow's own direct triggers just runs to completion
# instead of being cancelled by a newer one, which is a fine trade-off here.
jobs:
  # ── dart/bclibc and flutter/bclibc must stay pinned to the same commit —
  # each package needs its own submodule checkout (see dart_bclibc's own
  # comment in Makefile's verify-bclibc target for why they can't share
  # one), this just confirms they haven't drifted apart. ─────────────────────
  verify-bclibc:
    name: Verify bclibc submodules stay in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - run: make verify-bclibc

  # ── dart/ — pure Dart, no Flutter SDK needed ────────────────────────────────
  analyze-dart:
    name: dart/ Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dart
    steps:
      - uses: actions/checkout@v7

      - uses: dart-lang/setup-dart@v1

      - run: dart pub get
      - run: dart analyze --fatal-infos

  test-dart:
    name: dart/ Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: dart
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: dart-lang/setup-dart@v1

      - name: Install system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake clang

      - run: dart pub get
      - run: dart run bin/build_native.dart
      - run: dart test

  publish-dry-run-dart:
    name: dart/ pub.dev dry-run
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dart
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: dart-lang/setup-dart@v1

      - run: dart pub get
      - run: dart pub publish --dry-run

  # ── flutter/ — Flutter plugin wrapper ────────────────────────────────────────
  analyze-flutter:
    name: flutter/ Analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true

      - run: flutter pub get
      - run: flutter analyze

  # Exercises flutter/linux/CMakeLists.txt's Mode 3 (FetchContent) fallback
  # directly — no bclibc submodule checked out, simulating a fresh `dart pub
  # get`/`flutter pub get` of a git (not pub.dev-archive) dependency.
  test-flutter-fetchcontent:
    name: flutter/ Test / FetchContent (Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter
    steps:
      - uses: actions/checkout@v7
        # no submodules — simulates `dart pub get` of a git dep

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build clang

      - name: Build native library (Mode 3 — FetchContent)
        run: |
          cmake -S linux -B build/linux -DCMAKE_BUILD_TYPE=Debug -G Ninja
          cmake --build build/linux --parallel

      - run: test -f build/linux/_deps/bclibc-build/libbclibc_ffi.so

  # Native (non-web) tests need a real libbclibc_ffi.so on disk — built here
  # via dart/'s own build_native.dart (same artifact `dart run
  # dart_bclibc:build_native` produces for a plain Dart consumer) and pointed
  # at via BCLIBC_FFI_PATH, since `flutter test`'s isolate/JIT context doesn't
  # reliably resolve the package: URI strategy the way `flutter run`/`dart
  # run` do.
  test-flutter-native:
    name: flutter/ Test / native (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true

      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake clang

      - name: Build native library
        working-directory: dart
        run: |
          dart pub get
          dart run bin/build_native.dart

      - working-directory: flutter
        run: flutter pub get

      - name: Run tests
        working-directory: flutter
        env:
          BCLIBC_FFI_PATH: ${{ github.workspace }}/dart/lib/native/linux/libbclibc_ffi.so
        run: flutter test test/async_calculator_test.dart

  test-flutter-web:
    name: flutter/ Test / web (Chrome)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter
    steps:
      - uses: actions/checkout@v7
        # no submodules — this only needs the checked-in assets/wasm/
        # artifact, not a native bclibc build

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true

      - run: flutter pub get

      - name: Stage wasm test fixture
        run: |
          mkdir -p test/web/assets/packages/dart_bclibc_flutter/assets/wasm
          cp assets/wasm/bclibc_ffi.js assets/wasm/bclibc_ffi.wasm \
            test/web/assets/packages/dart_bclibc_flutter/assets/wasm/

      - name: Run web tests
        run: dart test -p chrome test/web/

  publish-dry-run-flutter:
    name: flutter/ pub.dev dry-run
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true

      - run: flutter pub get
      - run: dart pub publish --dry-run
