name: Release

# Triggered by pushing a tag like v1.2.3 -- that tag must already be sitting
# on a commit where dart/pubspec.yaml, flutter/pubspec.yaml (both its own
# `version:` and its `dart_bclibc: ^...` dependency constraint), and
# dart/CHANGELOG.md are all fully consistent with it. verify-release below
# only checks that; it never bumps/commits/pushes anything on your behalf,
# unlike this workflow's previous version (which used to bump pubspec.yaml
# and push a commit to main *after* the tag already existed -- a real
# footgun for anything that derives its version from the tag itself via
# `git describe`, and fragile even here since it meant the tag and the
# commit it was "for" could silently disagree).
#
# Run `scripts/ci/prepare_release.py X.Y.Z` locally to prepare all of the
# above as uncommitted edits for you to review, then commit + push to main
# + tag yourself -- see that script's docstring.
on:
  push:
    tags:
      - "v*"

env:
  RELEASE_TAG: ${{ github.ref_name }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Reuses ci.yml's own jobs (analyze/test/publish-dry-run for both
  # packages, plus the bclibc-submodule-parity check) via workflow_call.
  run-tests:
    uses: ./.github/workflows/ci.yml

  # ── verify the tag's commit already has consistent versions/changelog —
  # no writes, no commits. Fails the whole release instead of auto-fixing
  # anything; see scripts/ci/prepare_release.py for the local tool that gets
  # a commit into this state before you tag it ─────────────────────────────
  verify-release:
    needs: run-tests
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      # Checking out the tag itself (not main) is the point: this is the
      # exact commit publish-dart/publish-flutter will build from, so
      # whatever's wrong here is exactly what would otherwise break
      # publishing.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ env.RELEASE_TAG }}

      - name: Extract version and detect pre-release
        id: meta
        run: |
          VERSION="${RELEASE_TAG#v}"
          if [[ "$RELEASE_TAG" =~ (alpha|beta|rc) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: dart/ and flutter/ pubspec.yaml must already read this tag's version
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          DART_VERSION="$(grep '^version:' dart/pubspec.yaml | awk '{print $2}')"
          FLUTTER_VERSION="$(grep '^version:' flutter/pubspec.yaml | awk '{print $2}')"
          FLUTTER_DEP="$(grep -E '^\s*dart_bclibc: \^' flutter/pubspec.yaml | sed -E 's/.*\^([^[:space:]]+)$/\1/')"
          fail=0
          if [ "$DART_VERSION" != "$VERSION" ]; then
            echo "dart/pubspec.yaml has version $DART_VERSION, expected $VERSION"
            fail=1
          fi
          if [ "$FLUTTER_VERSION" != "$VERSION" ]; then
            echo "flutter/pubspec.yaml has version $FLUTTER_VERSION, expected $VERSION"
            fail=1
          fi
          if [ "$FLUTTER_DEP" != "$VERSION" ]; then
            echo "flutter/pubspec.yaml's dart_bclibc dependency constraint is ^$FLUTTER_DEP, expected ^$VERSION"
            fail=1
          fi
          if [ "$fail" = 1 ]; then
            echo "Run scripts/ci/prepare_release.py $VERSION locally, commit, and re-tag."
            exit 1
          fi

      - name: dart/CHANGELOG.md must already have a "## [$VERSION]" heading (not just [Unreleased])
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          V_RE="${VERSION//./\\.}"
          if ! grep -qE "^## \[$V_RE\]" dart/CHANGELOG.md; then
            echo "dart/CHANGELOG.md has no '## [$VERSION]' heading -- run scripts/ci/prepare_release.py $VERSION locally, commit, and re-tag."
            exit 1
          fi

  # ── create the GitHub release ────────────────────────────────────────────
  create-release:
    needs: verify-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          fetch-tags: true

      - name: Extract release notes from dart/CHANGELOG.md
        run: |
          VERSION="${{ needs.verify-release.outputs.version }}"
          ./scripts/ci/extract-changelog.sh "$VERSION" dart/CHANGELOG.md > /tmp/release_notes.md

          if [ ! -s /tmp/release_notes.md ]; then
            echo "No changelog entry found for $VERSION (or [Unreleased]) in dart/CHANGELOG.md -- add one first"
            exit 1
          fi

          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${RELEASE_TAG}$" | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            {
              echo ""
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${RELEASE_TAG}"
            } >> /tmp/release_notes.md
          fi

          echo "--- release notes ---"
          cat /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: /tmp/release_notes.md
          prerelease: ${{ needs.verify-release.outputs.prerelease }}

  # ── publish dart_bclibc to pub.dev ────────────────────────────────────────
  publish-dart:
    needs: [verify-release, create-release]
    runs-on: ubuntu-latest
    environment: pub-dart
    permissions:
      id-token: write # pub.dev OIDC trusted publisher
    defaults:
      run:
        working-directory: dart
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          submodules: recursive

      - uses: dart-lang/setup-dart@v1

      - run: dart pub get
      - run: dart pub publish --dry-run
      - run: dart pub publish --force

  # ── publish dart_bclibc_flutter to pub.dev ────────────────────────────────
  # Depends on publish-dart finishing first: dependency_overrides (path:
  # ../dart) only applies while this repo's own checkout is the root
  # package being resolved (i.e. right here in CI) -- it's inert once
  # dart_bclibc_flutter is a dependency of someone else's app, so its real
  # `dart_bclibc: ^VERSION` constraint should already be resolvable on
  # pub.dev by the time this publishes, not just locally.
  #
  # `environment: pub-flutter` is a *new* GitHub environment (this is a new
  # package -- set up its own pub.dev trusted publisher against this exact
  # environment name) with a wait-timer protection rule configured in this
  # repo's settings, giving pub.dev a few minutes to finish indexing the
  # dart_bclibc version publish-dart just published before this job tries
  # to resolve it as a real (non-overridden) dependency.
  publish-flutter:
    needs: [verify-release, create-release, publish-dart]
    runs-on: ubuntu-latest
    environment: pub-flutter
    permissions:
      id-token: write # pub.dev OIDC trusted publisher
    defaults:
      run:
        working-directory: flutter
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          submodules: recursive

      # dart-lang/setup-dart's bundled `dart` shadows on PATH; Flutter SDK
      # is required here to resolve `flutter: sdk: flutter`.
      - uses: dart-lang/setup-dart@v1
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          pub-cache: true

      - run: dart pub get
      - run: dart pub publish --dry-run
      - run: dart pub publish --force
