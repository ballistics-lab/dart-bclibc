name: dart_bclibc
description: "Dart FFI bindings for the bclibc ballistics engine."
version: 0.1.2-alpha
repository: https://github.com/ballistics-lab/dart-bclibc

environment:
  sdk: ^3.11.4
  flutter: ">=3.3.0"

dependencies:
  ffi: ^2.2.0
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  web: ^1.1.1

dev_dependencies:
  ffigen: ^20.1.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.24.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
